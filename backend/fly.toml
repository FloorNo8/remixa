# Fly.io deployment configuration for EU Sound Lab

app = "eu-sound-lab"
primary_region = "ams" # Amsterdam (EU)

[build]
  dockerfile = "Dockerfile"

[env]
  PORT = "8000"
  ENVIRONMENT = "production"

[http_service]
  internal_port = 8000
  force_https = true
  auto_stop_machines = false
  auto_start_machines = true
  min_machines_running = 1
  processes = ["web"]

  [[http_service.checks]]
    grace_period = "10s"
    interval = "30s"
    method = "GET"
    timeout = "5s"
    path = "/health"

# Web process (FastAPI server)
[processes]
  web = "uvicorn main:app --host 0.0.0.0 --port 8000"
  cron = "python -m scripts.cron_runner"

# Cron jobs configuration
[[services]]
  processes = ["cron"]
  
  # Daily challenge (9am CET)
  [[services.cron]]
    schedule = "0 9 * * *"
    command = "python -m scripts.daily_challenge"
  
  # Hourly payout processor
  [[services.cron]]
    schedule = "0 * * * *"
    command = "python -m scripts.process_payouts"
  
  # Midnight leaderboard update
  [[services.cron]]
    schedule = "0 0 * * *"
    command = "python -m scripts.update_leaderboards"
  
  # VAT MOSS quarterly filing (1st of Jan, Apr, Jul, Oct at 2am)
  [[services.cron]]
    schedule = "0 2 1 1,4,7,10 *"
    command = "python -m scripts.vat_moss_filing"

# Database (Postgres)
[[services]]
  protocol = "tcp"
  internal_port = 5432
  processes = ["web", "cron"]

  [[services.ports]]
    port = 5432

# Redis (for caching)
[[services]]
  protocol = "tcp"
  internal_port = 6379
  processes = ["web"]

  [[services.ports]]
    port = 6379

# Secrets (set via: fly secrets set KEY=value)
# Required secrets:
# - DATABASE_URL
# - R2_ACCESS_KEY_ID
# - R2_SECRET_ACCESS_KEY
# - R2_BUCKET_NAME
# - STRIPE_SECRET_KEY
# - STRIPE_WEBHOOK_SECRET
# - CLERK_SECRET_KEY
# - TIKTOK_CLIENT_KEY
# - TIKTOK_CLIENT_SECRET
# - OPENAI_API_KEY (for embeddings)

# Volume for persistent storage
[[mounts]]
  source = "eu_sound_lab_data"
  destination = "/data"
  processes = ["web", "cron"]

# VM resources
[vm]
  cpu_kind = "shared"
  cpus = 2
  memory_mb = 2048

# Auto-scaling
[scaling]
  min_machines = 1
  max_machines = 10

# Metrics
[metrics]
  port = 9091
  path = "/metrics"

# Deploy configuration
[deploy]
  release_command = "python -m scripts.migrate_db"
  strategy = "rolling"
