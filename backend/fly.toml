# fly.toml app configuration file generated for eu-sound-lab on 2026-06-20T01:31:27+03:00
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'eu-sound-lab'
primary_region = 'ams'

[build]
  dockerfile = 'Dockerfile'

[deploy]
  strategy = 'rolling'
  # release_command = 'python -m scripts.migrate_db'  # Disabled - migration script not yet implemented

[env]
  ENVIRONMENT = 'production'
  PORT = '8000'

[processes]
  cron = 'python -m scripts.cron_runner'
  web = 'uvicorn main:app --host 0.0.0.0 --port 8000'

[[mounts]]
  source = 'eu_sound_lab_data'
  destination = '/data'
  processes = ['web', 'cron']

[http_service]
  internal_port = 8000
  force_https = true
  auto_stop_machines = 'off'
  auto_start_machines = true
  min_machines_running = 1
  processes = ['web']

  [[http_service.checks]]
    interval = '30s'
    timeout = '5s'
    grace_period = '10s'
    method = 'GET'
    path = '/health'

[[services]]
  protocol = ''
  internal_port = 0
  ports = []
  processes = ['cron']

[[services]]
  protocol = 'tcp'
  internal_port = 5432
  processes = ['web', 'cron']

  [[services.ports]]
    port = 5432

[[services]]
  protocol = 'tcp'
  internal_port = 6379
  processes = ['web']

  [[services.ports]]
    port = 6379

[[vm]]
  cpu_kind = 'shared'
  cpus = 2
  memory_mb = 2048

[[metrics]]
  port = 9091
  path = '/metrics'
