# EU TikTok Sound Lab - Docker Compose
# Development and production deployment

version: '3.8'

services:
  # PostgreSQL Database
  postgres:
    image: postgres:15-alpine
    container_name: eu-sound-lab-db
    environment:
      POSTGRES_DB: eu_sound_lab
      POSTGRES_USER: eu_sound_lab_user
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database.sql:/docker-entrypoint-initdb.d/init.sql
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U eu_sound_lab_user"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - eu-sound-lab-network

  # FastAPI Backend
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: eu-sound-lab-api
    environment:
      DATABASE_URL: postgresql://eu_sound_lab_user:${DB_PASSWORD}@postgres:5432/eu_sound_lab
      STRIPE_SECRET_KEY: ${STRIPE_SECRET_KEY}
      STRIPE_WEBHOOK_SECRET: ${STRIPE_WEBHOOK_SECRET}
      JWT_SECRET: ${JWT_SECRET}
      STORAGE_URL: ${STORAGE_URL}
      STORAGE_ACCESS_KEY: ${STORAGE_ACCESS_KEY}
      STORAGE_SECRET_KEY: ${STORAGE_SECRET_KEY}
      SENTRY_DSN: ${SENTRY_DSN}
      ENVIRONMENT: production
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./uploads:/app/uploads
      - ./cache:/app/cache
    networks:
      - eu-sound-lab-network
    restart: unless-stopped

  # Redis (for rate limiting and caching)
  redis:
    image: redis:7-alpine
    container_name: eu-sound-lab-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - eu-sound-lab-network
    restart: unless-stopped

  # Nginx (reverse proxy)
  nginx:
    image: nginx:alpine
    container_name: eu-sound-lab-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./ssl:/etc/nginx/ssl:ro
    depends_on:
      - api
    networks:
      - eu-sound-lab-network
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:

networks:
  eu-sound-lab-network:
    driver: bridge
