[pytest]
# Pytest Configuration for EU TikTok Sound Lab
# NOTE: coverage config lives in backend/.coveragerc (coverage.py does NOT read pytest.ini's
# [coverage:*] sections — and putting them here previously orphaned the markers/filterwarnings
# below into the wrong INI section, so they were silently ignored). Keep this file single-section.

# Test discovery
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Test paths
testpaths = tests

# Output options
addopts =
    -v
    --strict-markers
    --tb=short
    --cov=.
    --cov-report=html
    --cov-report=term-missing
    --cov-report=xml
    --cov-fail-under=70

# Markers
markers =
    slow: marks tests as slow (deselect with '-m "not slow"')
    integration: marks tests as integration tests
    unit: marks tests as unit tests
    requires_redis: marks tests that require Redis
    requires_db: marks tests that require database
    requires_stripe: marks tests that require Stripe test mode

# Asyncio
asyncio_mode = auto

# Logging
log_cli = true
log_cli_level = INFO
log_cli_format = %(asctime)s [%(levelname)8s] %(message)s
log_cli_date_format = %Y-%m-%d %H:%M:%S

# Warnings
filterwarnings =
    error
    ignore::UserWarning
    ignore::DeprecationWarning
