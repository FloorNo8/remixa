name: linear-commit-join

# Observability: on every push to main, post a comment on each FN8-N issue linking the new
# commit(s). Closes the gap where the per-commit→Linear join "stayed silent" (squash-merges
# + direct pushes both covered). Idempotent — re-runs skip already-joined commits.

on:
  push:
    branches: [main]

concurrency:
  group: linear-join-${{ github.ref }}
  cancel-in-progress: false

jobs:
  join:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # need the before..after range available locally
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install --quiet requests
      - name: Join commits to Linear issues
        run: python scripts/linear_commit_join.py
        env:
          LINEAR_API_KEY: ${{ secrets.LINEAR_API_KEY }}
          REPO: ${{ github.repository }}
          COMMITS_BEFORE: ${{ github.event.before }}
          COMMITS_AFTER: ${{ github.sha }}
