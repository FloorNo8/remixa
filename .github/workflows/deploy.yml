name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      environment:
        description: 'Environment to deploy to'
        required: true
        default: 'production'
        type: choice
        options:
          - production
          - staging

# Serialize deploys per ref. Rapid successive merges otherwise fire concurrent deploys
# that race over Fly machine leases (lease-not-found / health-check timeout) — observed
# 2026-06-21 when 5 PRs merged at once. Latest-commit-wins; Fly's health-gated rolling
# deploy keeps the old healthy machine if a superseded run is cancelled mid-flight. FN8-701.
concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy-backend:
    runs-on: ubuntu-latest
    environment: ${{ github.event.inputs.environment || 'production' }}
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Flyctl
        uses: superfly/flyctl-actions/setup-flyctl@master
      
      - name: Deploy to Fly.io (Production)
        if: github.event.inputs.environment == 'production' || github.ref == 'refs/heads/main'
        run: |
          cd backend
          flyctl deploy --remote-only --app eu-sound-lab
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
      
      - name: Deploy to Fly.io (Staging)
        if: github.event.inputs.environment == 'staging'
        run: |
          cd backend
          flyctl deploy --remote-only --app remixa-api-staging --config fly.staging.toml
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
      
      # NOTE: Database migrations are applied manually for safety (money-critical schema)
      # See backend/migrations/ for SQL files and README_V2.md for application instructions

  deploy-frontend:
    runs-on: ubuntu-latest
    environment: ${{ github.event.inputs.environment || 'production' }}
    needs: deploy-backend
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json
      
      - name: Install Vercel CLI
        run: npm install -g vercel@latest
      
      - name: Pull Vercel Environment Information
        run: |
          cd frontend
          vercel pull --yes --environment=${{ github.event.inputs.environment == 'staging' && 'preview' || 'production' }} --token=${{ secrets.VERCEL_TOKEN }}
      
      - name: Build Project Artifacts
        run: |
          cd frontend
          vercel build ${{ github.event.inputs.environment == 'staging' && '' || '--prod' }} --token=${{ secrets.VERCEL_TOKEN }}
      
      - name: Deploy to Vercel (Production)
        if: github.event.inputs.environment == 'production' || github.ref == 'refs/heads/main'
        run: |
          cd frontend
          vercel deploy --prebuilt --prod --token=${{ secrets.VERCEL_TOKEN }}
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
      
      - name: Deploy to Vercel (Staging)
        if: github.event.inputs.environment == 'staging'
        run: |
          cd frontend
          vercel deploy --prebuilt --token=${{ secrets.VERCEL_TOKEN }}
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

  notify:
    runs-on: ubuntu-latest
    needs: [deploy-backend, deploy-frontend]
    if: always()
    
    steps:
      - name: Send deployment notification
        run: |
          if [ "${{ needs.deploy-backend.result }}" == "success" ] && [ "${{ needs.deploy-frontend.result }}" == "success" ]; then
            echo "✅ Deployment successful to ${{ github.event.inputs.environment || 'production' }}"
          else
            echo "❌ Deployment failed"
            exit 1
          fi
